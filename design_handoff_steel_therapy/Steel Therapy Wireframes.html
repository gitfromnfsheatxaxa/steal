<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Steel Therapy — Wireframes</title>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: #151515; font-family: 'Oswald', sans-serif; }
.sk-placeholder {
  background-image: repeating-linear-gradient(-45deg,#1a1a1a 0,#1a1a1a 2px,#141414 2px,#141414 10px);
  border: 1.5px dashed #252525;
  display:flex; align-items:center; justify-content:center;
  color:#2e2e2e; font-size:9px; text-align:center; padding:4px;
  font-family:'Share Tech Mono',monospace; letter-spacing:0.06em;
}
</style>
</head>
<body>
<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel">

const FONT = "'Oswald', sans-serif";
const MONO = "'Share Tech Mono', monospace";
const BG   = '#080808';
const BG2  = '#0d0d0d';
const BG3  = '#111';
const BORDER = '#1e1e1e';
const ACC  = '#e53e00';
const GRN  = '#22c55e';
const BLU  = '#3b82f6';

// ── primitives ────────────────────────────────────────────────

const T = ({ size=13, bold=false, mono=false, acc=false, grn=false, dim=false, muted=false, style={}, children }) => (
  <span style={{ fontFamily:mono?MONO:FONT, fontSize:size, fontWeight:bold?700:mono?400:500,
    color: acc?ACC : grn?GRN : dim?'#444' : muted?'#666' : '#d0d0d0', lineHeight:1.2, ...style }}>{children}</span>
);

const Divider = ({ style={} }) => <div style={{ height:1, background:BORDER, width:'100%', ...style }}/>;

const Pill = ({ acc=false, grn=false, dim=false, children, style={} }) => (
  <div style={{ padding:'1px 6px', border:`1.5px solid ${acc?ACC:grn?GRN:'#2a2a2a'}`,
    background:acc?ACC:'transparent', color:acc?'#fff':grn?GRN:'#444',
    fontFamily:MONO, fontSize:7, letterSpacing:'0.1em',
    display:'inline-flex', alignItems:'center', flexShrink:0, ...style }}>{children}</div>
);

const Btn = ({ acc=false, outline=false, ghost=false, full=false, h=28, children, style={} }) => (
  <div style={{ height:h, display:'flex', alignItems:'center', justifyContent:'center', padding:'0 12px',
    border:`2px solid ${acc?ACC:outline?'#2a2a2a':'#1a1a1a'}`,
    background:acc?ACC:ghost?BG3:'transparent',
    color:acc?'#fff':outline?'#888':'#555',
    fontFamily:FONT, fontSize:11, fontWeight:700, letterSpacing:'0.08em', textTransform:'uppercase',
    width:full?'100%':undefined, flexShrink:0, cursor:'pointer', ...style }}>{children}</div>
);

const SecLabel = ({ children, style={} }) => (
  <div style={{ display:'flex', alignItems:'center', gap:7, marginBottom:6, ...style }}>
    <T size={7} mono dim style={{ letterSpacing:'0.22em', flexShrink:0 }}>{children}</T>
    <div style={{ flex:1, height:1, background:BORDER }}/>
  </div>
);

const KpiCard = ({ label, value, unit, c=ACC }) => (
  <div style={{ flex:1, border:`1.5px solid ${BORDER}`, background:BG2, padding:'6px 8px', borderLeft:`3px solid ${c}`, minWidth:0 }}>
    <T size={7} mono dim style={{ display:'block', letterSpacing:'0.12em', marginBottom:3 }}>{label}</T>
    <T size={22} bold style={{ display:'block', color:c, fontFamily:FONT }}>{value}</T>
    {unit && <T size={7} mono dim style={{ display:'block', marginTop:1 }}>{unit}</T>}
  </div>
);

const SetRowWire = ({ set, weight, reps, done=false, active=false }) => (
  <div style={{ display:'flex', alignItems:'center', gap:5, padding:'3px 6px',
    background: done?'#0a1a0a':active?'#160800':BG3,
    border:`1px solid ${done?'#1a3a1a':active?ACC:BORDER}` }}>
    <T size={9} mono dim style={{ width:14 }}>{set}</T>
    <div style={{ width:46, height:22, border:`1px solid ${active?ACC:'#222'}`, background:BG, display:'flex', alignItems:'center', justifyContent:'center' }}>
      <T size={10} mono style={{ color:active?ACC:'#777' }}>{weight}kg</T>
    </div>
    <T size={9} dim>×</T>
    <div style={{ width:32, height:22, border:`1px solid ${active?ACC:'#222'}`, background:BG, display:'flex', alignItems:'center', justifyContent:'center' }}>
      <T size={10} mono style={{ color:active?ACC:'#777' }}>{reps}</T>
    </div>
    <div style={{ flex:1 }}/>
    <div style={{ width:22, height:22, border:`1.5px solid ${done?GRN:active?ACC:'#222'}`, background:done?'#0a2a0a':'transparent', display:'flex', alignItems:'center', justifyContent:'center' }}>
      {done && <T size={10} grn>✓</T>}
      {active && <div style={{ width:7,height:7,background:ACC,borderRadius:'50%' }}/>}
    </div>
  </div>
);

const Chart = ({ type='bar', h=65, label='' }) => (
  <div style={{ height:h, border:`1px solid ${BORDER}`, background:'#060606', position:'relative', overflow:'hidden', display:'flex', alignItems:'center', justifyContent:'center' }}>
    {type==='bar' && <div style={{ display:'flex', alignItems:'flex-end', gap:2, height:h-14, padding:'0 8px', width:'100%', position:'absolute', bottom:8 }}>
      {[32,50,38,72,48,62,80,58,68,90].map((v,i)=>(
        <div key={i} style={{ flex:1, height:`${v}%`, background:i===9?ACC:i===6?`${ACC}55`:'#1e1e1e', border:`1px solid ${i>=6?`${ACC}33`:'#252525'}` }}/>
      ))}
    </div>}
    {type==='line' && <svg width="100%" height={h-10} style={{ position:'absolute', top:4 }}>
      <polyline points="0,48 30,36 60,40 90,20 120,26 150,12 180,18 210,8 240,14 270,4" fill="none" stroke={ACC} strokeWidth="2"/>
      <polyline points="0,52 30,44 60,48 90,36 120,42 150,32 180,38 210,26 240,30 270,24" fill="none" stroke={BLU} strokeWidth="1.5" strokeDasharray="4 2"/>
    </svg>}
    {type==='heatmap' && <div style={{ display:'grid', gridTemplateColumns:'repeat(13,1fr)', gap:2, padding:'5px', width:'100%' }}>
      {Array.from({length:52}).map((_,i)=>{ const v=Math.random(); return <div key={i} style={{ aspectRatio:'1', background:v>.72?ACC:v>.48?`${ACC}55`:v>.28?'#1a0800':'#111' }}/>; })}
    </div>}
    {type==='radar' && <svg width="68" height="68" viewBox="0 0 68 68">
      <polygon points="34,4 62,22 56,54 12,54 6,22" fill="none" stroke="#1a1a1a" strokeWidth="1"/>
      <polygon points="34,14 54,28 50,48 18,48 14,28" fill={`${ACC}18`} stroke={ACC} strokeWidth="1.5"/>
    </svg>}
    {type==='donut' && <svg width="54" height="54" viewBox="0 0 54 54">
      <circle cx="27" cy="27" r="19" fill="none" stroke="#111" strokeWidth="9"/>
      <circle cx="27" cy="27" r="19" fill="none" stroke={ACC} strokeWidth="9" strokeDasharray="66 53" strokeDashoffset="14"/>
      <circle cx="27" cy="27" r="19" fill="none" stroke={GRN} strokeWidth="9" strokeDasharray="34 85" strokeDashoffset="-52"/>
      <circle cx="27" cy="27" r="19" fill="none" stroke={BLU} strokeWidth="9" strokeDasharray="19 100" strokeDashoffset="-86"/>
    </svg>}
    <T size={7} mono dim style={{ position:'absolute', bottom:3 }}>{label}</T>
  </div>
);

const NavTop = ({ title='', minimal=false }) => (
  <div style={{ height:44, borderBottom:`1px solid ${BORDER}`, background:'#050505', display:'flex', alignItems:'center', padding:'0 14px', gap:10, flexShrink:0 }}>
    <T size={12} bold mono acc style={{ letterSpacing:'0.2em' }}>STEAL</T>
    {!minimal && <T size={8} mono dim style={{ letterSpacing:'0.1em' }}>THERAPY</T>}
    <div style={{ flex:1 }}/>
    {!minimal && ['HQ','PLANS','WORKOUT','INTEL','SETTINGS'].map(l=>(
      <T key={l} size={9} mono dim style={{ letterSpacing:'0.08em', padding:'0 7px' }}>{l}</T>
    ))}
    {!minimal && <div style={{ width:28,height:28,borderRadius:'50%',border:`1.5px solid #2a2a2a`,background:'#1a1a1a' }}/>}
    {minimal && <div style={{ width:20,height:14,display:'flex',flexDirection:'column',justifyContent:'space-between' }}>
      <div style={{ height:2,background:'#333' }}/><div style={{ height:2,background:'#333' }}/><div style={{ height:2,background:'#333' }}/>
    </div>}
  </div>
);

const NavBottom = ({ active='dash' }) => {
  const tabs=[{id:'dash',l:'HQ',ic:'⊞'},{id:'plans',l:'PLANS',ic:'≡'},{id:'workout',l:'TRAIN',ic:'◉'},{id:'progress',l:'INTEL',ic:'▲'},{id:'settings',l:'SET',ic:'⊙'}];
  return (
    <div style={{ height:52,borderTop:`1px solid ${BORDER}`,background:'#050505',display:'flex',position:'absolute',bottom:0,left:0,right:0,zIndex:10 }}>
      {tabs.map(t=>(
        <div key={t.id} style={{ flex:1,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',gap:2,color:t.id===active?ACC:'#333' }}>
          <T size={15} style={{ color:'inherit',lineHeight:1 }}>{t.ic}</T>
          <T size={6} mono style={{ color:'inherit',letterSpacing:'0.06em' }}>{t.l}</T>
        </div>
      ))}
    </div>
  );
};

// ════════════════════════════════════════════════════════════════
// DASHBOARD
// ════════════════════════════════════════════════════════════════

// Shared week grid — REST DAY neutral, no red for missed
const WeekGrid = ({ compact=false }) => {
  const days = [
    {d:'MON',state:'done',label:'PUSH A'},
    {d:'TUE',state:'done',label:'PULL B'},
    {d:'WED',state:'rest',label:'REST DAY'},
    {d:'THU',state:'next',label:'LEGS C'},
    {d:'FRI',state:'plan',label:'PUSH D'},
    {d:'SAT',state:'rest',label:'REST DAY'},
    {d:'SUN',state:'rest',label:'REST DAY'},
  ];
  return (
    <div style={{ display:'grid', gridTemplateColumns:'repeat(7,1fr)', gap:compact?2:3 }}>
      {days.map((d,i)=>{
        const isNext = d.state==='next';
        const isDone = d.state==='done';
        const isRest = d.state==='rest';
        return (
          <div key={i} style={{ border:`1.5px solid ${isNext?ACC:isDone?`${GRN}44`:BORDER}`, padding:compact?'3px 1px':'4px 2px', textAlign:'center', background:isNext?'#180800':isDone?'#0a160a':BG }}>
            <T size={compact?6:7} mono dim style={{ display:'block', letterSpacing:'0.03em' }}>{d.d}</T>
            {isRest
              ? <T size={compact?7:8} mono dim style={{ display:'block', lineHeight:1.3, letterSpacing:'0.03em' }}>—</T>
              : <T size={compact?8:10} style={{ color:isNext?ACC:isDone?GRN:'#444', display:'block', lineHeight:1.3 }}>
                  {isDone?'✓':isNext?'▶':'·'}
                </T>
            }
            {!compact && <T size={5} mono dim style={{ display:'block', letterSpacing:'0.02em', marginTop:1 }}>
              {isRest ? 'REST' : d.label.split(' ')[0]}
            </T>}
          </div>
        );
      })}
    </div>
  );
};

// MOBILE dashboard
const DashMobile = () => (
  <div style={{ width:'100%',height:'100%',display:'flex',flexDirection:'column',background:'#060606',overflow:'hidden' }}>
    <NavTop minimal/>
    <div style={{ flex:1,overflowY:'auto',padding:'10px 10px 70px',display:'flex',flexDirection:'column',gap:8 }}>
      {/* Mission hero */}
      <div style={{ background:BG2,border:`1px solid ${BORDER}`,padding:10,display:'flex',gap:10,alignItems:'center' }}>
        <div style={{ flex:1 }}>
          <T size={7} mono dim style={{ display:'block',letterSpacing:'0.2em',marginBottom:3 }}>OPERATOR: MARCUS</T>
          <T size={18} bold style={{ color:'#f0f0f0',display:'block',lineHeight:1,textTransform:'uppercase' }}>SHEIKO HEAVY</T>
          <T size={8} mono dim style={{ display:'block',marginTop:3 }}>WK 3 · PUSH DAY A · ~65 MIN</T>
          <div style={{ display:'flex',gap:5,marginTop:7 }}>
            <Pill acc>NEXT: TODAY</Pill>
            <Pill dim>~65 MIN</Pill>
          </div>
          <Btn acc full h={30} style={{ marginTop:9,fontSize:12 }}>[ DEPLOY SESSION ]</Btn>
        </div>
        <svg width="68" height="68" viewBox="0 0 68 68" style={{ flexShrink:0 }}>
          <circle cx="34" cy="34" r="26" fill="none" stroke="#1a1a1a" strokeWidth="4"/>
          <circle cx="34" cy="34" r="26" fill="none" stroke={ACC} strokeWidth="4"
            strokeDasharray="98 65" strokeDashoffset="18"/>
          <text x="34" y="38" textAnchor="middle" fontSize="12" fontWeight="700" fill={ACC} fontFamily="Oswald,sans-serif">60%</text>
          <text x="34" y="49" textAnchor="middle" fontSize="6" fill="#444" fontFamily="Share Tech Mono,monospace">PROGRAM</text>
        </svg>
      </div>
      {/* 4 KPIs */}
      <div style={{ display:'grid',gridTemplateColumns:'1fr 1fr',gap:5 }}>
        <KpiCard label="STREAK" value="12" unit="DAYS" c={GRN}/>
        <KpiCard label="THIS WEEK" value="3/5" unit="SESSIONS" c={ACC}/>
        <KpiCard label="TOTAL VOL" value="42T" unit="LIFTED" c={ACC}/>
        <KpiCard label="PRS / MO" value="4" unit="RECORDS" c={BLU}/>
      </div>
      {/* Week grid */}
      <div style={{ border:`1px solid ${BORDER}`,background:BG2,padding:9 }}>
        <SecLabel>WEEK 3 SCHEDULE</SecLabel>
        <WeekGrid compact/>
      </div>
      {/* Activity */}
      <div style={{ border:`1px solid ${BORDER}`,background:BG2,padding:9 }}>
        <SecLabel>ACTIVITY LOG</SecLabel>
        {[{d:'20APR',l:'PUSH A',s:'18 SETS',v:'2.1T'},{d:'18APR',l:'LEGS B',s:'22 SETS',v:'3.4T'},{d:'16APR',l:'PULL A',s:'15 SETS',v:'1.9T'}].map((r,i)=>(
          <div key={i} style={{ display:'flex',gap:6,alignItems:'center',padding:'3px 0',borderBottom:i<2?`1px solid ${BORDER}`:undefined }}>
            <T size={8} mono dim style={{ width:38 }}>{r.d}</T>
            <T size={10} style={{ flex:1,textTransform:'uppercase',color:'#777' }}>{r.l}</T>
            <T size={8} mono dim>{r.s}</T>
            <T size={9} mono acc bold>{r.v}</T>
          </div>
        ))}
      </div>
    </div>
    <NavBottom active="dash"/>
  </div>
);

// DESKTOP dashboard — wide, more features
const DashDesktop = () => (
  <div style={{ width:'100%',height:'100%',display:'flex',flexDirection:'column',background:'#060606',overflow:'hidden' }}>
    {/* Top nav with full links */}
    <div style={{ height:48,borderBottom:`1px solid ${BORDER}`,background:'#050505',display:'flex',alignItems:'center',padding:'0 20px',gap:12,flexShrink:0 }}>
      <T size={13} bold mono acc style={{ letterSpacing:'0.2em' }}>STEAL THERAPY</T>
      <div style={{ width:1,height:20,background:'#2a2a2a',margin:'0 4px' }}/>
      {['HQ','PLANS','WORKOUT','INTEL','SETTINGS'].map(l=>(
        <T key={l} size={9} mono dim style={{ letterSpacing:'0.09em',padding:'0 6px',color:l==='HQ'?'#bbb':'#3a3a3a' }}>{l}</T>
      ))}
      <div style={{ flex:1 }}/>
      <T size={8} mono dim>21APR26 · 14:33</T>
      <div style={{ width:30,height:30,borderRadius:'50%',border:`1.5px solid #252525`,background:'#161616',display:'flex',alignItems:'center',justifyContent:'center' }}>
        <T size={11} muted>M</T>
      </div>
    </div>
    <div style={{ flex:1,overflowY:'auto',padding:'14px 20px',display:'flex',flexDirection:'column',gap:12 }}>
      {/* Header row */}
      <div style={{ display:'flex',alignItems:'flex-end',justifyContent:'space-between' }}>
        <div>
          <T size={8} mono dim style={{ display:'block',letterSpacing:'0.3em',marginBottom:4 }}>STEAL THERAPY</T>
          <T size={26} bold style={{ display:'block',lineHeight:0.9,color:'#f0f0f0',textTransform:'uppercase' }}>OPERATIONS<br/>DASHBOARD</T>
          <div style={{ height:2,width:32,background:ACC,marginTop:6 }}/>
        </div>
        <div style={{ display:'flex',gap:8,alignItems:'center' }}>
          <T size={8} mono dim>OPERATOR: MARCUS</T>
          <div style={{ width:1,height:14,background:'#2a2a2a' }}/>
          <T size={8} mono dim>21APR26 · 14:33</T>
        </div>
      </div>
      {/* 4 KPIs */}
      <div style={{ display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:8 }}>
        <KpiCard label="CURRENT STREAK" value="12" unit="DAYS" c={GRN}/>
        <KpiCard label="THIS WEEK" value="3" unit="SESSIONS" c={ACC}/>
        <KpiCard label="TOTAL VOLUME" value="42" unit="TONNES LIFTED" c={ACC}/>
        <KpiCard label="PRS THIS MONTH" value="4" unit="RECORDS SET" c={BLU}/>
      </div>
      {/* Main 3-col grid */}
      <div style={{ display:'grid',gridTemplateColumns:'2fr 1.2fr 1fr',gap:10 }}>
        {/* Active mission */}
        <div style={{ border:`1.5px solid ${ACC}33`,background:BG2,padding:12,display:'flex',flexDirection:'column',gap:7 }}>
          <SecLabel>ACTIVE MISSION</SecLabel>
          <div>
            <T size={20} bold style={{ color:'#f0f0f0',lineHeight:1,textTransform:'uppercase',display:'block' }}>SHEIKO HEAVY</T>
            <T size={8} mono dim style={{ display:'block',marginTop:3 }}>WK 3 / 12 · STRENGTH · ~65 MIN ESTIMATED</T>
          </div>
          <Divider/>
          {/* Progress ring + info row */}
          <div style={{ display:'flex',gap:10,alignItems:'center' }}>
            <svg width="58" height="58" viewBox="0 0 58 58" style={{ flexShrink:0 }}>
              <circle cx="29" cy="29" r="22" fill="none" stroke="#1a1a1a" strokeWidth="4"/>
              <circle cx="29" cy="29" r="22" fill="none" stroke={ACC} strokeWidth="4" strokeDasharray="83 55" strokeDashoffset="14"/>
              <text x="29" y="33" textAnchor="middle" fontSize="11" fontWeight="700" fill={ACC} fontFamily="Oswald,sans-serif">60%</text>
            </svg>
            <div>
              <T size={8} mono dim style={{ display:'block',marginBottom:4,letterSpacing:'0.1em' }}>NEXT SESSION</T>
              <T size={13} bold style={{ color:'#e0e0e0',display:'block',textTransform:'uppercase' }}>PUSH DAY A</T>
              <T size={8} mono dim>TODAY · 5 EXERCISES</T>
            </div>
          </div>
          <Divider/>
          {/* Exercise list */}
          {['BACK SQUAT — 4×5 @80%','BENCH PRESS — 3×3 @85%','ROM. DEADLIFT — 3×8 @65%','OVERHEAD PRESS — 3×8','DIPS — 3×AMRAP'].map((ex,i)=>(
            <div key={i} style={{ display:'flex',gap:7,alignItems:'center',padding:'3px 0',borderBottom:`1px solid ${BORDER}` }}>
              <T size={7} mono dim style={{ width:18 }}>{String(i+1).padStart(2,'0')}</T>
              <T size={11} bold style={{ color:'#bbb',flex:1,textTransform:'uppercase' }}>{ex}</T>
            </div>
          ))}
          <div style={{ marginTop:4 }}>
            <Btn acc full h={30} style={{ fontSize:12 }}>[ DEPLOY — START SESSION ]</Btn>
          </div>
        </div>
        {/* Week schedule + session history */}
        <div style={{ display:'flex',flexDirection:'column',gap:8 }}>
          <div style={{ border:`1px solid ${BORDER}`,background:BG2,padding:10 }}>
            <SecLabel>WEEK 3 SCHEDULE</SecLabel>
            <WeekGrid/>
          </div>
          <div style={{ border:`1px solid ${BORDER}`,background:BG2,padding:10,flex:1 }}>
            <SecLabel>UPCOMING</SecLabel>
            {[{l:'Push Day A',d:'TODAY',next:true},{l:'Pull Day B',d:'23APR'},{l:'Legs Day C',d:'25APR'}].map((s,i)=>(
              <div key={i} style={{ display:'flex',alignItems:'center',gap:6,padding:'4px 5px',border:`1px solid ${s.next?`${ACC}55`:BORDER}`,background:s.next?'#180800':BG,marginBottom:3 }}>

            <SecLabel style={{ marginTop:8 }}>COMPLETED</SecLabel>

                <T size={10} dim style={{ flex:1 }}>{s.l}</T>
              </div>
            ))}
          </div>
        </div>
        {/* Activity + PRs */}
        <div style={{ display:'flex',flexDirection:'column',gap:8 }}>
          <div style={{ border:`1px solid ${BORDER}`,background:BG2,padding:10,flex:1 }}>
            <SecLabel>ACTIVITY LOG</SecLabel>
            {[{d:'20APR',l:'PUSH A',v:'2.1T'},{d:'18APR',l:'LEGS B',v:'3.4T'},{d:'16APR',l:'PULL A',v:'1.9T'},{d:'14APR',l:'PUSH A',v:'2.0T'},{d:'12APR',l:'LEGS B',v:'3.1T'}].map((r,i)=>(
              <div key={i} style={{ display:'flex',gap:5,alignItems:'center',padding:'3px 0',borderBottom:i<4?`1px solid ${BORDER}`:undefined }}>
                <T size={8} mono dim style={{ width:36 }}>{r.d}</T>
                <T size={10} style={{ flex:1,textTransform:'uppercase',color:'#666' }}>{r.l}</T>
                <T size={9} mono acc bold>{r.v}</T>
              </div>
            ))}
          </div>
          <div style={{ border:`1px solid ${BORDER}`,background:BG2,padding:10 }}>
