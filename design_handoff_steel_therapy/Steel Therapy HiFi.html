<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Steel Therapy — Hi-Fi Prototype</title>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@300;400;500;600;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-font-smoothing:antialiased}
html,body,#root{height:100%;width:100%;overflow:hidden}
body{background:#080808;font-family:'Oswald',sans-serif;color:#d0d0d0}

/* ─── Forge background ─────────────────────────────────────── */
.forge-bg{position:fixed;inset:0;z-index:0;pointer-events:none;overflow:hidden;background:#080808}
.forge-blob{position:absolute;border-radius:50%;filter:blur(80px);mix-blend-mode:screen}
.blob-1{width:600px;height:600px;top:-200px;left:-100px;background:radial-gradient(circle,rgba(229,62,0,.18) 0%,transparent 70%);animation:blob1 18s ease-in-out infinite}
.blob-2{width:400px;height:400px;bottom:-100px;right:-80px;background:radial-gradient(circle,rgba(229,62,0,.12) 0%,transparent 70%);animation:blob2 22s ease-in-out infinite}
.blob-3{width:300px;height:300px;top:40%;left:40%;background:radial-gradient(circle,rgba(180,40,0,.08) 0%,transparent 70%);animation:blob3 28s ease-in-out infinite}
@keyframes blob1{0%,100%{transform:translate(0,0) scale(1)}50%{transform:translate(60px,40px) scale(1.15)}}
@keyframes blob2{0%,100%{transform:translate(0,0) scale(1)}50%{transform:translate(-40px,-60px) scale(1.2)}}
@keyframes blob3{0%,100%{transform:translate(0,0) scale(1)}33%{transform:translate(80px,-40px) scale(1.1)}66%{transform:translate(-60px,50px) scale(0.9)}}

/* Tactical grid overlay */
.forge-grid{position:absolute;inset:0;background-image:linear-gradient(rgba(229,62,0,.025) 1px,transparent 1px),linear-gradient(90deg,rgba(229,62,0,.025) 1px,transparent 1px);background-size:40px 40px;animation:grid-drift 60s linear infinite}
@keyframes grid-drift{from{background-position:0 0}to{background-position:40px 40px}}

/* Noise overlay */
.forge-noise{position:absolute;inset:0;opacity:0.03;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E")}

/* ─── Glass card ───────────────────────────────────────────── */
.glass{background:rgba(255,255,255,0.05);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border:1px solid rgba(255,255,255,0.08);box-shadow:0 8px 32px rgba(0,0,0,.5),inset 0 1px 0 rgba(255,255,255,.06)}
.glass-dark{background:rgba(0,0,0,.4);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);border:1px solid rgba(255,255,255,.06);box-shadow:0 16px 48px rgba(0,0,0,.7)}
.glass-acc{background:rgba(229,62,0,.08);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border:1px solid rgba(229,62,0,.25);box-shadow:0 8px 32px rgba(229,62,0,.15),inset 0 1px 0 rgba(229,62,0,.1)}
.glass-hover{transition:transform .25s cubic-bezier(.23,1,.32,1),box-shadow .25s cubic-bezier(.23,1,.32,1),border-color .25s}
.glass-hover:hover{transform:translateY(-2px);box-shadow:0 16px 48px rgba(0,0,0,.6),0 0 0 1px rgba(229,62,0,.2),inset 0 1px 0 rgba(255,255,255,.1)}

/* ─── Accent glow button ───────────────────────────────────── */
.btn-forge{background:#e53e00;color:#fff;border:none;font-family:'Oswald',sans-serif;font-weight:700;letter-spacing:.1em;text-transform:uppercase;cursor:pointer;transition:all .25s cubic-bezier(.23,1,.32,1);position:relative;overflow:hidden}
.btn-forge::after{content:'';position:absolute;inset:0;background:linear-gradient(rgba(255,255,255,.1),transparent);opacity:0;transition:opacity .2s}
.btn-forge:hover{background:#ff4500;box-shadow:0 0 24px rgba(229,62,0,.5),0 4px 16px rgba(0,0,0,.4);transform:translateY(-1px)}
.btn-forge:hover::after{opacity:1}
.btn-ghost{background:transparent;color:#888;border:1px solid rgba(255,255,255,.1);font-family:'Oswald',sans-serif;font-weight:600;letter-spacing:.08em;text-transform:uppercase;cursor:pointer;transition:all .2s cubic-bezier(.23,1,.32,1)}
.btn-ghost:hover{border-color:rgba(229,62,0,.4);color:#ccc;background:rgba(229,62,0,.06)}

/* ─── Tags / pills ─────────────────────────────────────────── */
.tag{font-family:'Share Tech Mono',monospace;font-size:9px;letter-spacing:.1em;padding:2px 7px;border:1px solid rgba(255,255,255,.1);color:#555;display:inline-block}
.tag-acc{border-color:rgba(229,62,0,.4);color:#e53e00;background:rgba(229,62,0,.08)}
.tag-grn{border-color:rgba(34,197,94,.4);color:#22c55e;background:rgba(34,197,94,.08)}

/* ─── Progress bar ─────────────────────────────────────────── */
.prog-bar{height:3px;background:rgba(255,255,255,.06);position:relative;overflow:hidden}
.prog-fill{height:100%;background:linear-gradient(90deg,#e53e00,#ff6a00);box-shadow:0 0 8px rgba(229,62,0,.6)}

/* ─── Scrollbars ───────────────────────────────────────────── */
.scroll::-webkit-scrollbar{width:3px}
.scroll::-webkit-scrollbar-track{background:transparent}
.scroll::-webkit-scrollbar-thumb{background:rgba(229,62,0,.3);border-radius:2px}

/* ─── Bottom nav ───────────────────────────────────────────── */
.bottom-nav{position:absolute;bottom:0;left:0;right:0;height:56px;display:flex;border-top:1px solid rgba(255,255,255,.06)}
.bottom-nav .tab{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;cursor:pointer;transition:all .2s;font-family:'Share Tech Mono',monospace;font-size:7px;letter-spacing:.08em;color:#333}
.bottom-nav .tab.active{color:#e53e00}
.bottom-nav .tab:hover:not(.active){color:#666}

/* ─── Top nav ──────────────────────────────────────────────── */
.top-nav{height:52px;border-bottom:1px solid rgba(255,255,255,.06);display:flex;align-items:center;padding:0 20px;gap:12px;flex-shrink:0;position:relative;z-index:1}

/* ─── KPI card ─────────────────────────────────────────────── */
.kpi{padding:12px 14px;position:relative;overflow:hidden}
.kpi::before{content:'';position:absolute;left:0;top:0;bottom:0;width:2px}
.kpi-acc::before{background:linear-gradient(to bottom,#e53e00,#ff6a00);box-shadow:0 0 8px rgba(229,62,0,.4)}
.kpi-grn::before{background:linear-gradient(to bottom,#22c55e,#16a34a)}
.kpi-blu::before{background:linear-gradient(to bottom,#3b82f6,#2563eb)}

/* ─── Separator ────────────────────────────────────────────── */
.sep{height:1px;background:rgba(255,255,255,.06);width:100%}

/* ─── Set row ──────────────────────────────────────────────── */
.set-row{display:flex;align-items:center;gap:8px;padding:6px 10px;border:1px solid rgba(255,255,255,.05);transition:all .2s}
.set-row.done{border-color:rgba(34,197,94,.2);background:rgba(34,197,94,.04)}
.set-row.active{border-color:rgba(229,62,0,.4);background:rgba(229,62,0,.06)}
.set-input{background:rgba(0,0,0,.5);border:1px solid rgba(255,255,255,.08);color:#e0e0e0;font-family:'Share Tech Mono',monospace;font-size:14px;text-align:center;padding:4px;width:52px;height:28px}
.set-input.active-in{border-color:rgba(229,62,0,.5);color:#e53e00;background:rgba(229,62,0,.08)}

/* ─── Dev guide ────────────────────────────────────────────── */
.dev-guide{position:fixed;bottom:0;left:0;right:0;z-index:100;transform:translateY(calc(100% - 44px));transition:transform .35s cubic-bezier(.23,1,.32,1)}
.dev-guide.open{transform:translateY(0)}
.dev-guide-handle{height:44px;display:flex;align-items:center;padding:0 20px;cursor:pointer;gap:10px;border-top:1px solid rgba(229,62,0,.3)}
.dev-guide-body{max-height:50vh;overflow-y:auto;padding:20px}

/* ─── Micro-animations ─────────────────────────────────────── */
@keyframes fade-up{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
.fade-up{animation:fade-up .4s cubic-bezier(.23,1,.32,1) both}
.fade-up-1{animation-delay:.05s}.fade-up-2{animation-delay:.1s}.fade-up-3{animation-delay:.15s}.fade-up-4{animation-delay:.2s}.fade-up-5{animation-delay:.25s}

@keyframes pulse-acc{0%,100%{box-shadow:0 0 0 rgba(229,62,0,0)}50%{box-shadow:0 0 20px rgba(229,62,0,.3)}}
.pulse{animation:pulse-acc 3s ease-in-out infinite}

/* ─── Tweaks ───────────────────────────────────────────────── */
.tweaks-panel{position:fixed;bottom:80px;right:20px;z-index:200;width:220px;padding:16px;display:none}
.tweaks-panel.visible{display:block}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef } = React;

const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "accent": "#e53e00",
  "accentGlow": "rgba(229,62,0,0.3)",
  "screen": "dashboard"
}/*EDITMODE-END*/;

// ─── Shared tokens ────────────────────────────────────────────
const ACC = '#e53e00';
const GRN = '#22c55e';
const BLU = '#3b82f6';
const MONO = "'Share Tech Mono', monospace";
const HEAD = "'Oswald', sans-serif";

// ─── Forge Background ─────────────────────────────────────────
const ForgeBg = () => (
  <div className="forge-bg">
    <div className="forge-blob blob-1"/>
    <div className="forge-blob blob-2"/>
    <div className="forge-blob blob-3"/>
    <div className="forge-grid"/>
    <div className="forge-noise"/>
  </div>
);

// ─── Primitives ───────────────────────────────────────────────
const Mono = ({ size=10, c='#444', bold=false, style={}, children }) => (
  <span style={{ fontFamily:MONO, fontSize:size, color:c, fontWeight:bold?700:400, letterSpacing:'0.08em', lineHeight:1.3, ...style }}>{children}</span>
);

const Label = ({ children, style={} }) => (
  <div style={{ display:'flex', alignItems:'center', gap:8, marginBottom:8, ...style }}>
    <Mono size={8} c="#333" style={{ letterSpacing:'0.2em', flexShrink:0 }}>{children}</Mono>
    <div className="sep" style={{ flex:1 }}/>
  </div>
);

const Tag = ({ acc=false, grn=false, children }) => (
  <span className={`tag${acc?' tag-acc':grn?' tag-grn':''}`}>{children}</span>
);

const KpiGlass = ({ label, value, unit, type='acc', delay=0 }) => (
  <div className={`glass kpi kpi-${type} glass-hover fade-up fade-up-${delay+1}`} style={{ borderRadius:0 }}>
    <Mono size={8} c="#333" style={{ display:'block', letterSpacing:'0.15em', marginBottom:6, textTransform:'uppercase' }}>{label}</Mono>
    <div style={{ fontFamily:HEAD, fontSize:26, fontWeight:700, color:type==='grn'?GRN:type==='blu'?BLU:ACC, lineHeight:1 }}>{value}</div>
    {unit && <Mono size={8} c="#444" style={{ display:'block', marginTop:4, textTransform:'uppercase' }}>{unit}</Mono>}
  </div>
);

const GlassCard = ({ children, acc=false, style={}, className='' }) => (
  <div className={`${acc?'glass-acc':'glass'} glass-hover ${className}`} style={{ borderRadius:0, ...style }}>{children}</div>
);

const ForgeBtn = ({ children, full=false, h=36, size=11, onClick, style={} }) => (
  <button className="btn-forge" onClick={onClick} style={{ height:h, width:full?'100%':undefined, fontSize:size, padding:'0 16px', display:'flex', alignItems:'center', justifyContent:'center', gap:8, ...style }}>
    {children}
  </button>
);

const GhostBtn = ({ children, h=32, size=10, onClick, style={} }) => (
  <button className="btn-ghost" onClick={onClick} style={{ height:h, fontSize:size, padding:'0 12px', display:'flex', alignItems:'center', justifyContent:'center', gap:6, ...style }}>
    {children}
  </button>
);

// ─── Nav components ───────────────────────────────────────────
const TopNav = ({ screen, setScreen }) => (
  <div className="top-nav glass-dark">
    <div style={{ fontFamily:HEAD, fontWeight:700, fontSize:15, color:ACC, letterSpacing:'0.2em' }}>STEAL</div>
    <div style={{ width:1, height:16, background:'rgba(255,255,255,.08)', margin:'0 2px' }}/>
    <div style={{ fontFamily:MONO, fontSize:9, color:'#333', letterSpacing:'0.1em' }}>THERAPY</div>
    <div style={{ flex:1 }}/>
    {[['dashboard','HQ'],['workout','TRAIN'],['progress','INTEL'],['exercises','DRILLS'],['plans','PLANS']].map(([id,label])=>(
      <button key={id} onClick={()=>setScreen(id)} style={{ background:'none', border:'none', cursor:'pointer', fontFamily:MONO, fontSize:9, letterSpacing:'0.09em', color:screen===id?'#ccc':'#333', padding:'0 8px', borderBottom:screen===id?`1px solid ${ACC}`:'1px solid transparent', paddingBottom:2, transition:'all .2s' }}>
        {label}
      </button>
    ))}
    <div style={{ width:30, height:30, borderRadius:'50%', background:'rgba(255,255,255,.06)', border:'1px solid rgba(255,255,255,.1)', display:'flex', alignItems:'center', justifyContent:'center' }}>
      <Mono size={11} c="#888">M</Mono>
    </div>
  </div>
);

const BottomNavBar = ({ screen, setScreen }) => {
  const tabs = [['dashboard','HQ','⊞'],['plans','PLANS','≡'],['workout','TRAIN','◉'],['progress','INTEL','▲'],['exercises','DRILLS','⊙']];
  return (
    <div className="bottom-nav glass-dark">
      {tabs.map(([id,label,icon])=>(
        <div key={id} className={`tab${screen===id?' active':''}`} onClick={()=>setScreen(id)}>
          <div style={{ fontSize:18, lineHeight:1 }}>{icon}</div>
          <div>{label}</div>
        </div>
      ))}
    </div>
  );
};

// ─── Week grid ────────────────────────────────────────────────
const WeekGrid = () => {
  const days = [
    {d:'M',state:'done',n:'PUSH A'},
    {d:'T',state:'done',n:'PULL B'},
    {d:'W',state:'rest'},
    {d:'T',state:'next',n:'LEGS C'},
    {d:'F',state:'plan',n:'PUSH D'},
    {d:'S',state:'rest'},
    {d:'S',state:'rest'},
  ];
  return (
    <div style={{ display:'grid', gridTemplateColumns:'repeat(7,1fr)', gap:3 }}>
      {days.map((d,i)=>(
        <div key={i} style={{ border:`1px solid ${d.state==='next'?`${ACC}66`:d.state==='done'?'rgba(34,197,94,.2)':'rgba(255,255,255,.05)'}`, padding:'5px 2px', textAlign:'center', background:d.state==='next'?'rgba(229,62,0,.08)':d.state==='done'?'rgba(34,197,94,.04)':'rgba(0,0,0,.3)', transition:'all .2s' }}>
          <Mono size={7} c="#2a2a2a" style={{ display:'block', marginBottom:3 }}>{d.d}</Mono>
          {d.state==='rest'
            ? <Mono size={8} c="#1e1e1e">—</Mono>
            : <div style={{ fontSize:11, color:d.state==='done'?GRN:d.state==='next'?ACC:'#2a2a2a', lineHeight:1 }}>
                {d.state==='done'?'✓':d.state==='next'?'▶':'·'}
              </div>
          }
          {d.n && d.state!=='rest' && <Mono size={6} c={d.state==='done'?'#1a3a1a':d.state==='next'?'rgba(229,62,0,.4)':'#1a1a1a'} style={{ display:'block', marginTop:2 }}>{d.n.split(' ')[0]}</Mono>}
          {d.state==='rest' && <Mono size={6} c="#161616" style={{ display:'block', marginTop:2 }}>REST</Mono>}
        </div>
      ))}
    </div>
  );
};

// ════════════════════════════════════════════════════════════════
// SCREEN: DASHBOARD
// ════════════════════════════════════════════════════════════════
const DashboardScreen = () => (
  <div style={{ flex:1, overflowY:'auto', padding:'16px 20px', display:'flex', flexDirection:'column', gap:14 }} className="scroll">
    {/* Header */}
    <div className="fade-up" style={{ borderBottom:'1px solid rgba(255,255,255,.06)', paddingBottom:12, display:'flex', alignItems:'flex-end', justifyContent:'space-between' }}>
      <div>
        <Mono size={8} c="#2a2a2a" style={{ display:'block', letterSpacing:'0.3em', marginBottom:6 }}>STEAL THERAPY</Mono>
        <div style={{ fontFamily:HEAD, fontSize:32, fontWeight:700, color:'#f0f0f0', lineHeight:.88, textTransform:'uppercase' }}>OPERATIONS<br/>DASHBOARD</div>
        <div style={{ height:2, width:32, background:`linear-gradient(90deg,${ACC},transparent)`, marginTop:8, boxShadow:`0 0 8px ${ACC}` }}/>
      </div>
      <div style={{ textAlign:'right' }}>
        <Mono size={9} c="#2a2a2a">OPERATOR: MARCUS</Mono>
        <Mono size={9} c="#222" style={{ display:'block', marginTop:3 }}>21APR26 · 14:33</Mono>
      </div>
    </div>
    {/* 4 KPIs */}
    <div style={{ display:'grid', gridTemplateColumns:'repeat(4,1fr)', gap:8 }}>
      <KpiGlass label="Current Streak" value="12" unit="Days" type="grn" delay={0}/>
      <KpiGlass label="This Week" value="3" unit="Sessions" delay={1}/>
      <KpiGlass label="Total Volume" value="42" unit="Tonnes" delay={2}/>
      <KpiGlass label="PRs This Month" value="4" unit="Records" type="blu" delay={3}/>
    </div>
    {/* Main grid */}
    <div style={{ display:'grid', gridTemplateColumns:'2fr 1.2fr 1fr', gap:10 }}>
      {/* Active mission */}
      <GlassCard acc className="pulse fade-up fade-up-2" style={{ padding:16, display:'flex', flexDirection:'column', gap:10 }}>
        <Label>Active Mission</Label>
        <div style={{ display:'flex', gap:12, alignItems:'center' }}>
          <div style={{ flex:1 }}>
            <div style={{ fontFamily:HEAD, fontSize:22, fontWeight:700, color:'#f0f0f0', textTransform:'uppercase', lineHeight:1 }}>Sheiko Heavy</div>
            <Mono size={8} c="#444" style={{ display:'block', marginTop:4 }}>WK 3 / 12 · STRENGTH · ~65 MIN</Mono>
          </div>
          <svg width="60" height="60" viewBox="0 0 60 60">
            <circle cx="30" cy="30" r="24" fill="none" stroke="rgba(255,255,255,.05)" strokeWidth="4"/>
            <circle cx="30" cy="30" r="24" fill="none" stroke={ACC} strokeWidth="4"
              strokeDasharray="90 61" strokeDashoffset="18"
              style={{ filter:`drop-shadow(0 0 6px ${ACC})` }}/>
            <text x="30" y="34" textAnchor="middle" fontSize="12" fontWeight="700" fill={ACC} fontFamily="Oswald,sans-serif">60%</text>
          </svg>
        </div>
        <div className="sep"/>
        {['BACK SQUAT — 4×5 @80%','BENCH PRESS — 3×3 @85%','ROM. DEADLIFT — 3×8 @65%','OVERHEAD PRESS — 3×8','DIPS — 3×AMRAP'].map((ex,i)=>(
          <div key={i} style={{ display:'flex', gap:8, alignItems:'center', padding:'3px 0', borderBottom:'1px solid rgba(255,255,255,.04)' }}>
            <Mono size={7} c="#222" style={{ width:20 }}>{String(i+1).padStart(2,'0')}</Mono>
            <div style={{ fontFamily:HEAD, fontSize:12, fontWeight:600, color:'#bbb', flex:1, textTransform:'uppercase', letterSpacing:'.03em' }}>{ex}</div>
          </div>
        ))}
        <ForgeBtn full h={36} size={12} style={{ marginTop:4 }}>[ Deploy — Start Session ]</ForgeBtn>
      </GlassCard>
      {/* Week + upcoming */}
      <div style={{ display:'flex', flexDirection:'column', gap:8 }}>
        <GlassCard className="fade-up fade-up-3" style={{ padding:12 }}>
          <Label>Week 3 Schedule</Label>
          <WeekGrid/>
        </GlassCard>
        <GlassCard className="fade-up fade-up-4" style={{ padding:12, flex:1 }}>
          <Label>Upcoming</Label>
          {[{l:'Push Day A',d:'TODAY',next:true},{l:'Pull Day B',d:'23 APR'},{l:'Legs Day C',d:'25 APR'}].map((s,i)=>(
            <div key={i} style={{ display:'flex', alignItems:'center', gap:6, padding:'5px 7px', border:`1px solid ${s.next?`${ACC}44`:'rgba(255,255,255,.04)'}`, background:s.next?'rgba(229,62,0,.06)':'rgba(0,0,0,.3)', marginBottom:4 }}>
              <div style={{ fontFamily:HEAD, fontSize:11, fontWeight:600, color:s.next?'#e0e0e0':'#444', flex:1, textTransform:'uppercase' }}>{s.l}</div>
              <Mono size={8} c={s.next?ACC:'#2a2a2a'}>{s.d}</Mono>
            </div>
          ))}
          <div style={{ marginTop:8 }}>
            <Mono size={7} c="#1e3a1e" style={{ letterSpacing:'0.15em', display:'block', marginBottom:5 }}>COMPLETED</Mono>
            {[{l:'Pull Day B · 19 APR'},{l:'Legs Day C · 17 APR'}].map((s,i)=>(
              <div key={i} style={{ display:'flex', alignItems:'center', gap:6, padding:'4px 7px', border:'1px solid rgba(34,197,94,.1)', background:'rgba(34,197,94,.04)', marginBottom:3, opacity:.7 }}>
                <div style={{ color:GRN, fontSize:11 }}>✓</div>
                <div style={{ fontFamily:HEAD, fontSize:11, color:'#333', textTransform:'uppercase' }}>{s.l}</div>
              </div>
            ))}
          </div>
        </GlassCard>
      </div>
      {/* Activity + PRs */}
      <div style={{ display:'flex', flexDirection:'column', gap:8 }}>
        <GlassCard className="fade-up fade-up-4" style={{ padding:12, flex:1 }}>
          <Label>Activity Log</Label>
          {[{d:'20 APR',l:'PUSH A',v:'2.1T'},{d:'18 APR',l:'LEGS B',v:'3.4T'},{d:'16 APR',l:'PULL A',v:'1.9T'},{d:'14 APR',l:'PUSH A',v:'2.0T'},{d:'12 APR',l:'LEGS B',v:'3.1T'}].map((r,i)=>(
            <div key={i} style={{ display:'flex', gap:5, alignItems:'center', padding:'4px 0', borderBottom:'1px solid rgba(255,255,255,.04)' }}>
              <Mono size={8} c="#222" style={{ width:40 }}>{r.d}</Mono>

// ════════════════════════════════════════════════════════════════
// ROOT APP
// ════════════════════════════════════════════════════════════════
function App() {
  const [screen, setScreen] = useState('dashboard');
  const [tweaksVisible, setTweaksVisible] = useState(false);
  const isMobile = window.innerWidth < 700;

  useEffect(()=>{
    const saved = localStorage.getItem('st-screen');
    if(saved) setScreen(saved);
  },[]);

  useEffect(()=>{
    localStorage.setItem('st-screen', screen);
  },[screen]);

  // Tweaks protocol
  useEffect(()=>{
    const handler = (e) => {
      if(e.data?.type==='__activate_edit_mode') setTweaksVisible(true);
      if(e.data?.type==='__deactivate_edit_mode') setTweaksVisible(false);
    };
    window.addEventListener('message', handler);
    window.parent.postMessage({type:'__edit_mode_available'},'*');
    return ()=>window.removeEventListener('message', handler);
  },[]);

  const screens = { dashboard:<DashboardScreen/>, workout:<WorkoutScreen/>, progress:<ProgressScreen/>, exercises:<ExercisesScreen/>, plans:<PlansScreen/> };

  return (
    <div style={{ height:'100vh', display:'flex', flexDirection:'column', position:'relative', overflow:'hidden' }} data-screen-label={screen}>
      <ForgeBg/>
      <div style={{ position:'relative', zIndex:1, display:'flex', flexDirection:'column', height:'100%' }}>
        <TopNav screen={screen} setScreen={setScreen}/>
        {screens[screen]}
        <BottomNavBar screen={screen} setScreen={setScreen}/>
      </div>
      <DevGuide/>
      <TweaksPanel visible={tweaksVisible}/>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
